<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>snip — url shortener</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #e8ff47;
      --accent-dim: rgba(232, 255, 71, 0.12);
      --text: #f0f0f0;
      --muted: #555;
      --error: #ff5c5c;
      --success: #47ffb2;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232,255,71,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* header */
    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeUp 0.6s ease both;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(52px, 10vw, 88px);
      letter-spacing: -4px;
      line-height: 1;
      color: var(--text);
      position: relative;
      display: inline-block;
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      margin-top: 12px;
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* card */
    .card {
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .input-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="url"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="url"]::placeholder { color: var(--muted); }

    input[type="url"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    button.shorten-btn {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      padding: 14px 22px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.05em;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button.shorten-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    button.shorten-btn:active { transform: translateY(0); }
    button.shorten-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #0a0a0a;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    button.shorten-btn.loading .spinner { display: block; }
    button.shorten-btn.loading .btn-text { display: none; }

    /* result */
    .result {
      margin-top: 20px;
      border-radius: 10px;
      padding: 16px;
      display: none;
      animation: fadeUp 0.3s ease both;
    }

    .result.success {
      display: block;
      background: rgba(71, 255, 178, 0.06);
      border: 1px solid rgba(71, 255, 178, 0.2);
    }

    .result.error {
      display: block;
      background: rgba(255, 92, 92, 0.06);
      border: 1px solid rgba(255, 92, 92, 0.2);
    }

    .result-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .result-url-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-url {
      font-size: 14px;
      color: var(--success);
      word-break: break-all;
      flex: 1;
    }

    .result.error .result-url {
      color: var(--error);
      font-size: 13px;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid rgba(71, 255, 178, 0.3);
      border-radius: 7px;
      color: var(--success);
      padding: 6px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      letter-spacing: 0.05em;
    }

    .copy-btn:hover { background: rgba(71, 255, 178, 0.08); }
    .copy-btn.copied { color: var(--accent); border-color: rgba(232,255,71,0.3); }

    /* divider */
    .divider {
      margin: 28px 0;
      border: none;
      border-top: 1px solid var(--border);
    }

    /* history */
    .history-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      animation: fadeUp 0.3s ease both;
    }

    .history-short {
      font-size: 12px;
      color: var(--accent);
      flex-shrink: 0;
      text-decoration: none;
    }
    .history-short:hover { text-decoration: underline; }

    .history-arrow {
      color: var(--muted);
      font-size: 11px;
      flex-shrink: 0;
    }

    .history-long {
      font-size: 11px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .history-copy {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .history-copy:hover { color: var(--text); }

    .empty-history {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 16px 0;
    }

    /* footer */
    footer {
      margin-top: 40px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-align: center;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="logo">sni<span>p</span></div>
      <p class="tagline">Serverless URL Shortener · AWS Lambda + DynamoDB</p>
    </header>

    <div class="card">
      <label class="input-label" for="urlInput">Paste your long URL</label>
      <div class="input-row">
        <input
          type="url"
          id="urlInput"
          placeholder="https://example.com/very/long/url"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="shorten-btn" id="shortenBtn" onclick="shortenUrl()">
          <span class="spinner"></span>
          <span class="btn-text">Shorten →</span>
        </button>
      </div>

      <div class="result" id="result">
        <div class="result-label" id="resultLabel">Your short URL</div>
        <div class="result-url-row">
          <span class="result-url" id="resultUrl"></span>
          <button class="copy-btn" id="copyBtn" onclick="copyResult()">copy</button>
        </div>
      </div>

      <hr class="divider" />

      <div class="history-label">Recent links</div>
      <div class="history-list" id="historyList">
        <div class="empty-history">No links yet — shorten something!</div>
      </div>
    </div>

    <footer>
      Built by <a href="https://github.com/kbharat1210" target="_blank">Bharat Reddy</a>
      &nbsp;·&nbsp;
      <a href="https://github.com/kbharat1210" target="_blank">View on GitHub</a>
    </footer>
  </div>

  <script>
    // ── CONFIG ──────────────────────────────────────────────────────────────
    // Replace this with your actual API Gateway URL
    const API_BASE = 'YOUR_API_GATEWAY_URL_HERE';

    // ── STATE ───────────────────────────────────────────────────────────────
    let history = JSON.parse(localStorage.getItem('snip_history') || '[]');

    // ── INIT ────────────────────────────────────────────────────────────────
    renderHistory();

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenUrl();
    });

    // ── SHORTEN ─────────────────────────────────────────────────────────────
    async function shortenUrl() {
      const input = document.getElementById('urlInput');
      const btn   = document.getElementById('shortenBtn');
      const url   = input.value.trim();

      if (!url) return showError('Please enter a URL.');
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        return showError('URL must start with http:// or https://');
      }

      btn.disabled = true;
      btn.classList.add('loading');
      hideResult();

      try {
        const res  = await fetch(`${API_BASE}/urls`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ long_url: url })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.message || 'Something went wrong.');
          return;
        }

        const shortUrl = `${API_BASE}/urls/${data.short_code}`;
        showSuccess(shortUrl);
        addToHistory(shortUrl, url);
        input.value = '';

      } catch (err) {
        showError('Network error — check your connection.');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    // ── RESULT DISPLAY ───────────────────────────────────────────────────────
    function showSuccess(shortUrl) {
      const result = document.getElementById('result');
      result.className = 'result success';
      document.getElementById('resultLabel').textContent = 'Your short URL';
      document.getElementById('resultUrl').textContent = shortUrl;
      document.getElementById('resultUrl').dataset.url = shortUrl;
      document.getElementById('copyBtn').style.display = 'block';
      document.getElementById('copyBtn').textContent = 'copy';
      document.getElementById('copyBtn').className = 'copy-btn';
    }

    function showError(msg) {
      const result = document.getElementById('result');
      result.className = 'result error';
      document.getElementById('resultLabel').textContent = 'Error';
      document.getElementById('resultUrl').textContent = msg;
      document.getElementById('copyBtn').style.display = 'none';
    }

    function hideResult() {
      document.getElementById('result').className = 'result';
    }

    // ── COPY ─────────────────────────────────────────────────────────────────
    function copyResult() {
      const url = document.getElementById('resultUrl').dataset.url;
      copyToClipboard(url);
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'copy';
        btn.classList.remove('copied');
      }, 2000);
    }

    function copyToClipboard(text) {
      navigator.clipboard?.writeText(text) ?? fallbackCopy(text);
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    // ── HISTORY ──────────────────────────────────────────────────────────────
    function addToHistory(shortUrl, longUrl) {
      history.unshift({ shortUrl, longUrl, ts: Date.now() });
      if (history.length > 10) history = history.slice(0, 10);
      localStorage.setItem('snip_history', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (!history.length) {
        list.innerHTML = '<div class="empty-history">No links yet — shorten something!</div>';
        return;
      }
      list.innerHTML = history.map((item, i) => `
        <div class="history-item" style="animation-delay:${i * 0.04}s">
          <a class="history-short" href="${item.shortUrl}" target="_blank">${item.shortUrl.split('/').pop()}</a>
          <span class="history-arrow">→</span>
          <span class="history-long" title="${item.longUrl}">${item.longUrl}</span>
          <button class="history-copy" title="Copy short URL" onclick="copyToClipboard('${item.shortUrl}'); this.textContent='✓'; setTimeout(()=>this.textContent='⎘',1500)">⎘</button>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
